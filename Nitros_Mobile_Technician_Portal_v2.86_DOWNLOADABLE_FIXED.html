<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nitros Mobile Technician Portal v2.86</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0f172a;--panel:#fff;--line:#cbd5e1;--accent:#2563eb;--good:#16a34a;--warn:#d97706;--bad:#dc2626}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#e5e7eb;color:#111827}header{background:var(--bg);color:#fff;padding:16px}header h1{font-size:20px;margin:0}.sub{font-size:12px;color:#cbd5e1;margin-top:4px}main{padding:14px;max-width:760px;margin:auto}.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}label{font-size:13px;font-weight:700;display:block;margin:8px 0 4px}input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:8px;font-size:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:0;border-radius:8px;padding:11px 14px;font-weight:700;cursor:pointer;margin:4px 4px 4px 0}.primary{background:var(--accent);color:#fff}.good{background:var(--good);color:#fff}.warn{background:var(--warn);color:#fff}.bad{background:var(--bad);color:#fff}.secondary{background:#475569;color:#fff}.muted{color:#64748b;font-size:13px}.job{border-left:5px solid var(--accent)}.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#e2e8f0;font-size:12px;font-weight:700}.timer{font-size:25px;font-weight:800;margin:8px 0}.hidden{display:none}@media(max-width:560px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>Nitros Mobile Technician Portal</h1><div class="sub">Version 2.86 — Live Cloud Connection — Downloadable Build</div></header>
<main>
<section id="login" class="card">
<h2>Connect</h2>
<label>Supabase Project URL</label><input id="url" placeholder="https://your-project.supabase.co">
<label>Publishable Key</label><input id="key" type="password" placeholder="sb_publishable_...">
<div class="grid"><div><label>Shop ID</label><input id="shop" value="NITROS-001"></div><div><label>Technician Name</label><input id="tech" value="Robert"></div></div>
<label>Email</label><input id="email" type="email"><label>Password</label><input id="password" type="password">
<button class="btn secondary" id="saveConfig">Save Configuration</button><button class="btn primary" id="connect">Sign In & Connect</button><div id="status" class="muted">Not connected.</div>
</section>
<section id="jobs" class="hidden"><div class="card"><h2>My Assigned Jobs</h2><button class="btn secondary" id="refresh">Refresh</button><button class="btn secondary" id="signout">Sign Out</button></div><div id="jobList"></div></section>
</main>
<script>
const $=id=>document.getElementById(id);let client,user,profile,channel,jobs=[];const CONFIG_KEY='nitros_mobile_v286_config';
function saveConfig(){localStorage.setItem(CONFIG_KEY,JSON.stringify({url:$('url').value.trim(),key:$('key').value.trim(),shop:$('shop').value.trim(),tech:$('tech').value.trim(),email:$('email').value.trim()}));$('status').textContent='Configuration saved on this device.'}
function loadConfig(){try{const c=JSON.parse(localStorage.getItem(CONFIG_KEY)||'{}');if(c.url)$('url').value=c.url;if(c.key)$('key').value=c.key;if(c.shop)$('shop').value=c.shop;if(c.tech)$('tech').value=c.tech;if(c.email)$('email').value=c.email}catch(e){console.warn('Saved configuration could not be loaded',e)}}
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function elapsed(j){let total=Number(j.activeSeconds||0);if(j.timerRunning&&j.startedAt)total+=Math.max(0,Math.floor((Date.now()-new Date(j.startedAt))/1000));let h=Math.floor(total/3600),m=Math.floor(total%3600/60),s=total%60;return [h,m,s].map(x=>String(x).padStart(2,'0')).join(':')}
async function connect(){try{$('status').textContent='Connecting…';client=window.supabase.createClient($('url').value.trim(),$('key').value.trim(),{auth:{persistSession:true,autoRefreshToken:true}});let r=await client.auth.signInWithPassword({email:$('email').value.trim(),password:$('password').value});if(r.error)throw r.error;user=r.data.user;let p=await client.from('profiles').select('*').eq('user_id',user.id).single();if(p.error)throw p.error;profile=p.data;if(profile.shop_id!==$('shop').value.trim())throw Error('This account belongs to '+profile.shop_id);$('login').classList.add('hidden');$('jobs').classList.remove('hidden');await loadJobs();subscribe();$('status').textContent='Connected';}catch(e){$('status').textContent='Connection failed: '+e.message}}
async function loadJobs(){let r=await client.from('shop_jobs').select('id,payload,updated_at').eq('shop_id',profile.shop_id).order('updated_at',{ascending:false});if(r.error){alert(r.error.message);return}jobs=(r.data||[]).map(x=>Object.assign({},x.payload,{id:x.id,updatedAt:x.updated_at}));render()}
function render(){let tech=$('tech').value.trim().toLowerCase();let mine=jobs.filter(j=>!j.technician||String(j.technician).toLowerCase()===tech);$('jobList').innerHTML=mine.length?mine.map(j=>`<div class="card job"><div><b>${esc(j.roNumber||'RO')}</b> — ${esc(j.vehicle||j.vehicleDescription||'Vehicle')}</div><div class="muted">${esc(j.customer||'Customer not listed')}</div><div style="margin-top:8px"><span class="badge">${esc(j.status||'Assigned')}</span></div><div class="timer" data-timer="${esc(j.id)}">${elapsed(j)}</div><label>Technician Notes</label><textarea data-notes="${esc(j.id)}">${esc(j.notes||j.technicianNotes||'')}</textarea><div><button class="btn good" data-action="start" data-id="${esc(j.id)}">Start / Resume</button><button class="btn warn" data-action="pause" data-id="${esc(j.id)}">Pause</button><button class="btn primary" data-action="save" data-id="${esc(j.id)}">Save Notes</button><button class="btn bad" data-action="complete" data-id="${esc(j.id)}">Complete</button></div></div>`).join(''):'<div class="card">No assigned jobs.</div>'}
async function updateJob(id,action){let j=jobs.find(x=>x.id===id);if(!j)return;let now=new Date().toISOString();if(action==='start'){j.status='In Progress';j.timerRunning=true;j.startedAt=now}else if(action==='pause'){if(j.timerRunning&&j.startedAt)j.activeSeconds=Number(j.activeSeconds||0)+Math.floor((Date.now()-new Date(j.startedAt))/1000);j.timerRunning=false;j.startedAt='';j.status='Paused'}else if(action==='complete'){if(j.timerRunning&&j.startedAt)j.activeSeconds=Number(j.activeSeconds||0)+Math.floor((Date.now()-new Date(j.startedAt))/1000);j.timerRunning=false;j.startedAt='';j.status='Completed';j.completedAt=now}else if(action==='save'){let t=document.querySelector(`[data-notes="${CSS.escape(id)}"]`);j.notes=t?t.value:j.notes}j.updatedAt=now;j.technician=$('tech').value.trim();let r=await client.from('shop_jobs').upsert({id:j.id,shop_id:profile.shop_id,payload:j,updated_at:now,updated_by:user.id});if(r.error)alert(r.error.message);render()}
function subscribe(){channel=client.channel('nitros-mobile-'+profile.shop_id).on('postgres_changes',{event:'*',schema:'public',table:'shop_jobs',filter:'shop_id=eq.'+profile.shop_id},()=>loadJobs()).subscribe()}
$('saveConfig').addEventListener('click',saveConfig);$('connect').addEventListener('click',()=>{saveConfig();connect()});$('refresh').addEventListener('click',loadJobs);$('signout').addEventListener('click',async()=>{if(channel)await client.removeChannel(channel);await client.auth.signOut();location.reload()});$('jobList').addEventListener('click',e=>{let b=e.target.closest('button[data-action]');if(b)updateJob(b.dataset.id,b.dataset.action)});loadConfig();setInterval(()=>document.querySelectorAll('[data-timer]').forEach(el=>{let j=jobs.find(x=>x.id===el.dataset.timer);if(j)el.textContent=elapsed(j)}),1000);
</script>
</body></html>
